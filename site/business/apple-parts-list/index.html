<style>
  :root {
    --blue: #0171B9; --blue-ink: #073b5e;
    --ink: #1a1d21; --slate: #5b6671; --slate-soft: #8b95a0;
    --mist: #eceff2; --line: #dde1e6;
    --bg: #f5f7fa; --header-bg: #1a1d21;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; font-family: 'Manrope', system-ui, -apple-system, sans-serif; color: var(--ink); background: var(--bg); -webkit-text-size-adjust: 100%; display: flex; flex-direction: column; overflow: hidden; }
  .skip-link {
    position: absolute; top: -100px; left: 12px; z-index: 999;
    background: var(--ink); color: #fff; padding: 12px 18px;
    border-radius: 8px; font-weight: 600; text-decoration: none;
  }
  .skip-link:focus { top: 12px; }

  .topbar { background: var(--header-bg); color: #fff; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-shrink: 0; z-index: 30; }
  .topbar h1 { font-size: 16px; font-weight: 700; margin: 0; }
  .topbar .meta { font-size: 11px; opacity: .7; font-weight: 500; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .topbar-actions button, .topbar-actions input {
    background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); color: #fff;
    padding: 7px 12px; border-radius: 8px; font-family: inherit; font-size: 13px; cursor: pointer;
  }
  .topbar-actions input { width: 200px; }
  .topbar-actions input::placeholder { color: rgba(255,255,255,.55); }
  .topbar-actions input:focus { outline: none; border-color: var(--blue); background: rgba(255,255,255,.15); }
  .topbar-actions button:hover { background: rgba(255,255,255,.2); }
  @media (max-width: 640px) {
    .topbar { flex-wrap: wrap; padding: 10px 12px; }
    .topbar-actions input { width: 100%; }
    .topbar-actions { width: 100%; flex-wrap: wrap; }
  }

  .stockbar { background: #fff; padding: 8px 16px; border-bottom: 1px solid var(--line); display: flex; gap: 14px; align-items: center; flex-wrap: wrap; font-size: 13px; flex-shrink: 0; z-index: 25; }
  .markup-control { display: flex; gap: 6px; align-items: center; font-size: 13px; }
  .markup-control label { font-weight: 600; color: var(--ink); }
  .markup-control input { width: 70px; padding: 5px 8px; border: 1px solid var(--line); border-radius: 6px; font-family: inherit; font-size: 13px; }
  .markup-control input.active { border-color: var(--blue); background: rgba(1,113,185,.06); font-weight: 600; }
  .markup-control input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 2px rgba(1,113,185,.15); }
  .markup-control .markup-suffix { color: var(--slate); font-size: 12px; }
  .stockbar label { display: flex; gap: 6px; align-items: center; cursor: pointer; }
  .stockbar input { accent-color: var(--blue); }
  .stockbar .count { margin-left: auto; color: var(--slate); font-size: 12px; }
  .stockbar .count strong { color: var(--ink); font-weight: 700; }

  /* Table */
  .table-wrap { flex: 1 1 auto; overflow: auto; -webkit-overflow-scrolling: touch; background: #fff; min-height: 0; }
  table { border-collapse: collapse; width: 100%; min-width: 1400px; font-size: 13px; }
  th, td { padding: 8px 10px; text-align: left; vertical-align: top; border-bottom: 1px solid var(--mist); white-space: nowrap; }

  thead { position: sticky; top: 0; background: #fff; z-index: 20; box-shadow: 0 1px 0 var(--line); }
  thead tr.label-row th {
    background: #f0f3f6; font-weight: 700; font-size: 11px; letter-spacing: .04em; text-transform: uppercase;
    color: var(--slate); padding: 10px 10px 6px; border-bottom: none;
    cursor: pointer; user-select: none; position: relative;
  }
  thead tr.label-row th:hover { background: #e6eaee; color: var(--ink); }
  thead tr.label-row th.sort-active { color: var(--blue); }
  thead tr.label-row th .sort-icon {
    display: inline-block; margin-left: 4px; opacity: .35; font-size: 10px; vertical-align: 1px;
  }
  thead tr.label-row th.sort-active .sort-icon { opacity: 1; }
  thead tr.label-row th.no-sort { cursor: default; }
  thead tr.label-row th.no-sort:hover { background: #f0f3f6; color: var(--slate); }
  thead tr.filter-row th {
    background: #f0f3f6; padding: 0 6px 8px; border-bottom: 1px solid var(--line);
  }
  thead select, thead input.col-search {
    width: 100%; padding: 5px 8px; border: 1px solid var(--line); border-radius: 6px;
    font-family: inherit; font-size: 12.5px; background: #fff; color: var(--ink); min-width: 90px; box-sizing: border-box;
  }
  thead select:focus, thead input.col-search:focus { outline: none; border-color: var(--blue); }
  thead select.active, thead input.col-search.active { border-color: var(--blue); background: rgba(1,113,185,.04); font-weight: 600; }

  tbody tr:nth-child(even) { background: #fafbfc; }
  tbody tr:hover { background: #eef5fb; }
  tbody td.copy-cell { cursor: pointer; user-select: none; }
  tbody td.copy-cell:hover { background: rgba(1,113,185,.08); }
  tbody td.copy-cell.copied { background: #d5f0e0; }
  tbody td.sku { font-family: 'SF Mono', ui-monospace, Menlo, monospace; font-weight: 700; }
  tbody td.price { text-align: right; font-variant-numeric: tabular-nums; }
  tbody td.price-customer { color: var(--blue-ink); font-weight: 600; }
  tbody td.price-dealer { color: #7a8a93; }
  tbody td.stock-cell { text-align: center; }
  tbody td.stock-yes { color: #0a7140; font-weight: 600; }
  tbody td.stock-no { color: #a52424; }

  tbody td.actions { text-align: right; padding: 4px 8px; }
  tbody td.actions button {
    background: var(--blue); color: #fff; border: none;
    padding: 5px 10px; border-radius: 6px; font-family: inherit; font-size: 11.5px; font-weight: 600;
    cursor: pointer;
  }
  tbody td.actions button.copied { background: #0a7140; }

  /* Drawer for full row details */
  .drawer-overlay {
    display: none;
    position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100;
    animation: fadeIn .2s;
  }
  .drawer-overlay.open { display: block; }
  .drawer {
    position: fixed; right: 0; top: 0; bottom: 0; width: 440px; max-width: 100vw;
    background: #fff; z-index: 101; transform: translateX(100%); transition: transform .25s;
    overflow-y: auto; box-shadow: -8px 0 30px rgba(0,0,0,.15);
  }
  .drawer.open { transform: translateX(0); }
  .drawer-head { background: var(--ink); color: #fff; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; }
  .drawer-head .drawer-sku { font-family: 'SF Mono', ui-monospace, monospace; font-size: 19px; font-weight: 700; }
  .drawer-close { background: rgba(255,255,255,.15); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; font-size: 20px; cursor: pointer; line-height: 1; }
  .drawer-body { padding: 24px; }
  .drawer-body h3 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--slate); margin: 24px 0 10px; }
  .drawer-body h3:first-child { margin-top: 0; }
  .drawer-body .desc { font-size: 15px; color: var(--ink); line-height: 1.5; margin: 0 0 4px; }
  .drawer-prices { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 6px; }
  .drawer-price {
    background: var(--mist); padding: 12px; border-radius: 10px; text-align: center;
    cursor: pointer; transition: background .15s;
  }
  .drawer-price:hover { background: #e2e7ec; }
  .drawer-price.copied { background: #d5f0e0; }
  .drawer-price .label { font-size: 10.5px; font-weight: 700; text-transform: uppercase; color: var(--slate); margin-bottom: 4px; letter-spacing: .06em; }
  .drawer-price .value { font-weight: 700; font-size: 16px; color: var(--ink); }
  .drawer-emails { display: grid; gap: 8px; }
  .drawer-emails .email-btn {
    text-align: left; background: #fff; border: 1px solid var(--line); border-radius: 8px;
    padding: 12px 14px; font-family: inherit; font-size: 13px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
  }
  .drawer-emails .email-btn:hover { background: var(--mist); }
  .drawer-emails .email-btn.copied { background: #d5f0e0; border-color: #5fb87f; }
  .drawer-emails .email-btn span { font-weight: 600; }
  .drawer-emails .email-btn small { color: var(--slate); font-size: 11px; }
  .drawer-specs { font-size: 13px; line-height: 1.7; }
  .drawer-specs .row { display: flex; gap: 8px; padding: 4px 0; border-bottom: 1px solid var(--mist); }
  .drawer-specs .k { color: var(--slate); min-width: 110px; }
  .drawer-specs .v { color: var(--ink); flex: 1; }

  .empty { padding: 60px 20px; text-align: center; color: var(--slate); font-size: 14px; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--ink); color: #fff; padding: 10px 18px; border-radius: 999px;
    font-size: 13px; font-weight: 600; transition: transform .25s;
    z-index: 200; pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>

</head><body>

<div class="topbar">
  <div>
    <h1>Apple Parts List</h1>
    <div class="meta" id="meta">Loading…</div>
  </div>
  <div class="topbar-actions">
    <input type="text" id="search" aria-label="Quick search across all SKUs, models, and colors" placeholder="Quick search SKU, model, color…" autocomplete="off" spellcheck="false">
    <button id="reset">Reset filters</button>
  </div>
</div>

<div class="stockbar">
  <label><input type="checkbox" id="stocked-only"> Stocked items only</label>
  <div class="markup-control">
    <label for="markup-input">Customer markup</label>
    <input type="number" id="markup-input" placeholder="1" min="0" max="50" step="0.1" inputmode="decimal" title="Override the default markup % on Customer Price (default: 1% for Macs/iPads, 5% for accessories). AppleCare and MacBook Neo are unaffected.">
    <span class="markup-suffix">%</span>
  </div>
  <span class="count"><strong id="result-count">0</strong> of <span id="total-count">0</span> SKUs</span>
</div>

<div class="table-wrap">
  <table id="tbl">
    <thead><tr class="label-row" id="label-row"></tr><tr class="filter-row" id="filter-row"></tr></thead>
    <tbody id="tbody"><tr><td colspan="20" class="empty">Loading data…</td></tr></tbody>
  </table>
</div>

<div class="drawer-overlay" id="overlay"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <div class="drawer-head">
    <div class="drawer-sku" id="d-sku">—</div>
    <button class="drawer-close" id="d-close" aria-label="Close">×</button>
  </div>
  <div class="drawer-body">
    <h3>Description</h3>
    <p class="desc" id="d-desc"></p>

    <h3>Prices (tap to copy)</h3>
    <div class="drawer-prices">
      <div class="drawer-price" id="d-msrp"><div class="label">MSRP</div><div class="value">—</div></div>
      <div class="drawer-price" id="d-dealer"><div class="label">Dealer B</div><div class="value">—</div></div>
      <div class="drawer-price" id="d-cust"><div class="label">Customer</div><div class="value">—</div></div>
    </div>

    <h3>Copy email blocks</h3>
    <div class="drawer-emails" id="d-emails"></div>

    <h3>Specs</h3>
    <div class="drawer-specs" id="d-specs"></div>
  </div>
</aside>

<div id="toast" role="status" aria-live="polite">Copied</div>

<script>
(function () {
  // ============ COLUMN CONFIG ============
  // Each column: key, label, type (text|price|stock|sku|action), filterType (select|search|none)
  const COLS = [
    { key: 'SKU',         label: 'SKU',           type: 'sku',        filter: 'search' },
    { key: 'Family',      label: 'Family',        type: 'text',       filter: 'select' },
    { key: 'Description', label: 'Description',   type: 'text',       filter: 'search' },
    { key: 'ScreenSize',  label: 'Screen',        type: 'text',       filter: 'select' },
    { key: 'Color',       label: 'Color',         type: 'text',       filter: 'select' },
    { key: 'Processor',   label: 'Chip',          type: 'text',       filter: 'select' },
    { key: 'Memory',      label: 'RAM',           type: 'text',       filter: 'select' },
    { key: 'Storage',     label: 'Storage',       type: 'text',       filter: 'select' },
    { key: 'NanoTexture', label: 'Nano',          type: 'text',       filter: 'select' },
    { key: 'Cellular',    label: 'Cellular',      type: 'text',       filter: 'select' },
    { key: 'Ethernet',    label: 'Ethernet',      type: 'text',       filter: 'select' },
    { key: 'Power',       label: 'Power',         type: 'text',       filter: 'select' },
    { key: 'MSRP',        label: 'MSRP',          type: 'price',      filter: 'none', priceKind: 'msrp' },
    { key: 'DealerB',     label: 'Dealer B',      type: 'price',      filter: 'none', priceKind: 'dealer' },
    { key: '__customer',  label: 'Customer',      type: 'price',      filter: 'none', priceKind: 'customer' },
    { key: 'Inventory',   label: 'Stock',         type: 'stock',      filter: 'none' },
    { key: '__action',    label: '',              type: 'action',     filter: 'none' },
  ];

  // ============ STATE ============
  const state = {
    items: [],
    colFilters: {},   // {Family: 'MacBook Air'}
    search: '',
    stockedOnly: false,
    customMarkup: null,  // number (percent) or null for default rules
    sortKey: 'Family',  // default sort
    sortDir: 'asc',     // 'asc' | 'desc'
  };

  // ============ HELPERS ============
  function customerPrice(item) {
    const d = Number(item.DealerB) || 0;
    const fam = (item.Family || '').toLowerCase();
    // Special cases — independent of custom markup
    if (fam.includes('applecare')) return Math.round((Number(item.MSRP) || 0) * 0.85 * 100) / 100;
    if (fam === 'macbook neo') return d;
    // Custom markup overrides default rules when staff has entered a value
    if (state.customMarkup != null) {
      return Math.round((d + 0.95) * (1 + state.customMarkup / 100) * 100) / 100;
    }
    // Default rules
    if (fam.includes('accessor') || fam.includes('cable') || fam.includes('adapter') || fam.includes('charger') ||
        fam.includes('keyboard') || fam.includes('mouse') || fam.includes('trackpad') || fam.includes('pencil')) {
      return Math.round((d + 0.95) * 1.05 * 100) / 100;
    }
    return Math.round((d + 0.95) * 1.01 * 100) / 100;
  }

  function money(n) {
    if (n == null || n === '' || isNaN(Number(n))) return '—';
    const num = Number(n);
    return '$' + num.toLocaleString('en-US', { minimumFractionDigits: num % 1 ? 2 : 0, maximumFractionDigits: 2 });
  }

  function getValue(item, col) {
    if (col.key === '__customer') return customerPrice(item);
    return item[col.key];
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }
  function escapeAttr(s) { return escapeHtml(s); }

  function distinctValues(items, key) {
    const seen = new Set();
    for (const it of items) {
      const v = it[key];
      if (v != null && v !== '') seen.add(String(v));
    }
    return [...seen].sort((a, b) => a.localeCompare(b, 'en', { numeric: true }));
  }

  // Normalize storage values to GB for sorting (256GB → 256, 1TB → 1000, 2TB → 2000)
  function storageToGB(v) {
    if (v == null || v === '') return null;
    const s = String(v).toUpperCase().trim();
    const num = parseFloat(s.replace(/[^0-9.]/g, ''));
    if (!Number.isFinite(num)) return null;
    if (s.includes('TB')) return num * 1000;
    if (s.includes('MB')) return num / 1000;
    return num; // assume GB
  }

  function sortValue(item, col) {
    if (!col) return '';
    if (col.type === 'price') {
      const v = getValue(item, col);
      const n = Number(v);
      return Number.isFinite(n) ? n : -Infinity;
    }
    if (col.key === 'Inventory') {
      const n = Number(item.Inventory);
      return Number.isFinite(n) ? n : -Infinity;
    }
    if (col.key === 'Storage' || col.key === 'Memory') {
      const gb = storageToGB(item[col.key]);
      return gb != null ? gb : -Infinity;
    }
    if (col.key === 'ScreenSize') {
      // "13-inch" → 13, "13.6-inch" → 13.6
      const v = item.ScreenSize;
      if (v == null) return -Infinity;
      const n = parseFloat(String(v).replace(/[^0-9.]/g, ''));
      return Number.isFinite(n) ? n : -Infinity;
    }
    const v = item[col.key];
    return v == null ? '' : String(v).toLowerCase();
  }

  function compareSort(a, b, col) {
    const av = sortValue(a, col);
    const bv = sortValue(b, col);
    if (typeof av === 'number' && typeof bv === 'number') return av - bv;
    return String(av).localeCompare(String(bv), 'en', { numeric: true });
  }

  function sortItems(items) {
    if (!state.sortKey) return items;
    const col = COLS.find(c => c.key === state.sortKey);
    if (!col) return items;
    const dir = state.sortDir === 'desc' ? -1 : 1;
    return [...items].sort((a, b) => compareSort(a, b, col) * dir);
  }

  // ============ FILTERING ============
  // For each filter, exclude that column's filter so the dropdown shows what's available
  // assuming all OTHER filters apply. (Standard Excel autofilter behavior.)
  function filteredItems(skipColKey) {
    return state.items.filter(it => {
      if (state.stockedOnly && (it.Stocked || '').toLowerCase() !== 'yes') return false;

      if (state.search) {
        const hay = [it.SKU, it.Description, it.Family, it.Color, it.Memory, it.Storage, it.Processor].join(' ').toLowerCase();
        if (!hay.includes(state.search)) return false;
      }

      for (const [k, v] of Object.entries(state.colFilters)) {
        if (k === skipColKey) continue;
        if (!v) continue;
        // Per-column search type matches as substring (case-insensitive)
        const col = COLS.find(c => c.key === k);
        if (!col) continue;
        const itVal = String(it[k] == null ? '' : it[k]).toLowerCase();
        if (col.filter === 'search') {
          if (!itVal.includes(String(v).toLowerCase())) return false;
        } else {
          if (itVal !== String(v).toLowerCase()) return false;
        }
      }
      return true;
    });
  }

  // ============ RENDER ============
  function renderHeaders() {
    const labelRow = document.getElementById('label-row');
    const filterRow = document.getElementById('filter-row');
    labelRow.innerHTML = COLS.map(c => {
      const sortable = c.type !== 'action';
      const isActive = state.sortKey === c.key;
      const arrow = isActive ? (state.sortDir === 'desc' ? '▼' : '▲') : '↕';
      const cls = (sortable ? '' : 'no-sort') + (isActive ? ' sort-active' : '');
      return `<th class="${cls}"${sortable ? ' data-sort="' + escapeAttr(c.key) + '"' : ''}>${escapeHtml(c.label)}${sortable ? `<span class="sort-icon">${arrow}</span>` : ''}</th>`;
    }).join('');

    // Wire sort clicks
    labelRow.querySelectorAll('th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const k = th.getAttribute('data-sort');
        if (state.sortKey === k) {
          state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          state.sortKey = k;
          state.sortDir = 'asc';
        }
        render();
      });
    });
    filterRow.innerHTML = COLS.map(c => {
      if (c.filter === 'none') return '<th></th>';
      const current = state.colFilters[c.key] || '';
      if (c.filter === 'search') {
        return `<th><input type="text" class="col-search ${current ? 'active' : ''}" data-col="${c.key}" value="${escapeAttr(current)}" aria-label="Filter ${escapeAttr(c.label)}" placeholder="filter…" autocomplete="off" spellcheck="false"></th>`;
      }
      const pool = filteredItems(c.key);
      const values = distinctValues(pool, c.key);
      const opts = values.map(v => `<option value="${escapeAttr(v)}"${current === v ? ' selected' : ''}>${escapeHtml(v)}</option>`).join('');
      return `<th><select class="col-filter ${current ? 'active' : ''}" data-col="${c.key}" aria-label="Filter ${escapeAttr(c.label)}">
        <option value="">All</option>
        ${opts}
      </select></th>`;
    }).join('');

    // Wire up
    filterRow.querySelectorAll('.col-filter').forEach(sel => {
      sel.addEventListener('change', e => {
        const k = e.target.getAttribute('data-col');
        if (e.target.value) state.colFilters[k] = e.target.value;
        else delete state.colFilters[k];
        render();
      });
    });
    filterRow.querySelectorAll('.col-search').forEach(inp => {
      inp.addEventListener('input', e => {
        const k = e.target.getAttribute('data-col');
        if (e.target.value.trim()) state.colFilters[k] = e.target.value.trim();
        else delete state.colFilters[k];
        renderBody(); // skip header re-render to keep focus
        updateActiveClasses();
      });
    });
  }

  function updateActiveClasses() {
    document.querySelectorAll('.col-filter, .col-search').forEach(el => {
      const k = el.getAttribute('data-col');
      if (state.colFilters[k]) el.classList.add('active');
      else el.classList.remove('active');
    });
  }

  function cellHtml(item, col) {
    const v = getValue(item, col);
    const dataAttr = ` data-sku="${escapeAttr(item.SKU)}"`;
    switch (col.type) {
      case 'sku':
        return `<td class="sku copy-cell" data-copy="${escapeAttr(item.SKU || '')}">${escapeHtml(item.SKU || '')}</td>`;
      case 'price': {
        const formatted = money(v);
        let cls = 'price';
        if (col.priceKind === 'customer') cls += ' price-customer';
        if (col.priceKind === 'dealer') cls += ' price-dealer';
        const copyVal = (v == null || v === '') ? '' : v;
        return `<td class="${cls} copy-cell" data-copy="${escapeAttr(copyVal)}">${formatted}</td>`;
      }
      case 'stock': {
        const inStock = (item.Stocked || '').toLowerCase() === 'yes';
        const inv = item.Inventory;
        const txt = inStock ? (inv != null && inv !== '' ? inv : '✓') : '—';
        return `<td class="stock-cell ${inStock ? 'stock-yes' : 'stock-no'}">${escapeHtml(txt)}</td>`;
      }
      case 'action':
        return `<td class="actions"><button type="button" class="open-drawer"${dataAttr}>View</button></td>`;
      default:
        return `<td class="copy-cell" data-copy="${escapeAttr(v || '')}">${escapeHtml(v == null ? '' : v)}</td>`;
    }
  }

  function renderBody() {
    const results = sortItems(filteredItems());
    document.getElementById('result-count').textContent = results.length;
    document.getElementById('total-count').textContent = state.items.length;

    const tbody = document.getElementById('tbody');
    if (results.length === 0) {
      tbody.innerHTML = `<tr><td colspan="${COLS.length}" class="empty">No matching SKUs. Try clearing filters.</td></tr>`;
      return;
    }
    tbody.innerHTML = results.map(item => '<tr>' + COLS.map(c => cellHtml(item, c)).join('') + '</tr>').join('');

    // Wire cell-copy
    tbody.querySelectorAll('.copy-cell').forEach(td => {
      td.addEventListener('click', () => {
        const val = td.getAttribute('data-copy');
        if (val) copy(val, td, 'Copied ' + val);
      });
    });
    // Wire drawer open
    tbody.querySelectorAll('.open-drawer').forEach(btn => {
      btn.addEventListener('click', () => {
        const sku = btn.getAttribute('data-sku');
        openDrawer(sku);
      });
    });
  }

  function render() {
    renderHeaders();
    renderBody();
  }

  // ============ DRAWER ============
  function openDrawer(sku) {
    const item = state.items.find(it => it.SKU === sku);
    if (!item) return;
    document.getElementById('d-sku').textContent = item.SKU || '—';
    document.getElementById('d-desc').textContent = item.Description || '';

    const cust = customerPrice(item);
    setDrawerPrice('d-msrp', 'MSRP', item.MSRP);
    setDrawerPrice('d-dealer', 'Dealer B', item.DealerB);
    setDrawerPrice('d-cust', 'Customer', cust);

    // Email blocks
    const blocks = [
      { label: 'Email — Customer price', text: `${item.Description}\nSKU: ${item.SKU}\nPrice: ${money(cust)}` },
      { label: 'Email — MSRP', text: `${item.Description}\nSKU: ${item.SKU}\nPrice: ${money(item.MSRP)}` },
      { label: 'Email — Dealer B', text: `${item.Description}\nSKU: ${item.SKU}\nPrice: ${money(item.DealerB)}` },
      { label: 'One-line summary', text: `${item.SKU} — ${item.Description} — ${money(item.MSRP)}` },
    ];
    document.getElementById('d-emails').innerHTML = blocks.map((b, i) => `
      <button type="button" class="email-btn" data-block="${i}">
        <span>${escapeHtml(b.label)}</span>
        <small>Copy</small>
      </button>
    `).join('');
    document.querySelectorAll('#d-emails .email-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = +btn.getAttribute('data-block');
        copy(blocks[idx].text, btn, 'Email block copied');
      });
    });

    // Specs
    const specFields = [
      ['Family', item.Family], ['Screen', item.ScreenSize], ['Color', item.Color],
      ['Chip', item.Processor], ['Memory', item.Memory], ['Storage', item.Storage],
      ['Power', item.Power], ['Nano-Texture', item.NanoTexture], ['Cellular', item.Cellular],
      ['Ethernet', item.Ethernet], ['Keyboard', item.Keyboard], ['Moveability', item.Moveability],
      ['TDS SKU', item.TDS_SKU], ['INGRAM SKU', item.INGRAM_SKU],
      ['Stock', item.Inventory != null ? item.Inventory + ((item.Stocked || '').toLowerCase() === 'yes' ? '' : ' (not stocked)') : '—'],
    ];
    document.getElementById('d-specs').innerHTML = specFields.filter(([_, v]) => v != null && v !== '').map(([k, v]) => `<div class="row"><div class="k">${k}</div><div class="v">${escapeHtml(v)}</div></div>`).join('');

    document.getElementById('drawer').classList.add('open');
    document.getElementById('drawer').setAttribute('aria-hidden', 'false');
    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function setDrawerPrice(id, label, value) {
    const el = document.getElementById(id);
    el.innerHTML = `<div class="label">${label}</div><div class="value">${money(value)}</div>`;
    el.onclick = () => copy(value != null ? String(value) : '', el, label + ' copied');
  }

  function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawer').setAttribute('aria-hidden', 'true');
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('d-close').addEventListener('click', closeDrawer);
  document.getElementById('overlay').addEventListener('click', closeDrawer);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

  // ============ COPY ============
  let toastTimer = null;
  function copy(text, el, message) {
    if (!text) return;
    const fallback = () => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      ta.remove();
    };
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).catch(fallback);
    } else {
      fallback();
    }
    if (el) {
      el.classList.add('copied');
      setTimeout(() => el.classList.remove('copied'), 1200);
    }
    if (message) showToast(message);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1600);
  }

  // ============ TOP-LEVEL CONTROLS ============
  document.getElementById('search').addEventListener('input', e => {
    state.search = e.target.value.trim().toLowerCase();
    render();
  });
  document.getElementById('stocked-only').addEventListener('change', e => {
    state.stockedOnly = e.target.checked;
    render();
  });
  document.getElementById('markup-input').addEventListener('input', e => {
    const v = parseFloat(e.target.value);
    state.customMarkup = isNaN(v) ? null : v;
    e.target.classList.toggle('active', state.customMarkup != null);
    renderBody();
  });
  document.getElementById('reset').addEventListener('click', () => {
    state.colFilters = {};
    state.search = '';
    document.getElementById('search').value = '';
    render();
  });

  // ============ LOAD ============
  fetch('../../assets/data/parts.json?v=' + Date.now())
    .then(r => r.json())
    .then(data => {
      state.items = data.items || [];
      const m = data._meta || {};
      document.getElementById('meta').textContent =
        (m.generated_at ? 'Data refreshed ' + new Date(m.generated_at).toLocaleDateString() : '') +
        ' · ' + state.items.length + ' SKUs';
      render();
    })
    .catch(err => {
      document.getElementById('meta').textContent = 'Failed to load: ' + err.message;
      document.getElementById('tbody').innerHTML = '<tr><td colspan="20" class="empty">Failed to load data.</td></tr>';
    });
})();
</script>

</body></html>
